function canUseStorage() {
  if (typeof window === 'undefined') return false;
  try {
    const testKey = '__agafonov_storage_test__';
    window.localStorage.setItem(testKey, '1');
    window.localStorage.removeItem(testKey);
    return true;
  } catch {
    return false;
  }
}

function safeRead(key, fallback) {
  if (!canUseStorage()) return fallback;
  try {
    const raw = window.localStorage.getItem(key);
    if (!raw) return fallback;
    const parsed = JSON.parse(raw);
    return parsed ?? fallback;
  } catch {
    return fallback;
  }
}

function safeWrite(key, value) {
  if (!canUseStorage()) return;
  try {
    window.localStorage.setItem(key, JSON.stringify(value));
  } catch {}
}

function normalizeState(candidate) {
  const next = candidate && typeof candidate === 'object' ? candidate : {};

  return {
    services: Array.isArray(next.services) ? next.services : SERVICES_SEED,
    orders: Array.isArray(next.orders) ? next.orders : INITIAL_ORDERS,
    reviews: Array.isArray(next.reviews) ? next.reviews : INITIAL_REVIEWS,
    payouts: Array.isArray(next.payouts) ? next.payouts : INITIAL_PAYOUTS,
    adminAuthed: Boolean(next.adminAuthed)
  };
}

function readPersistedAppState() {
  if (!canUseStorage()) return FALLBACK_APP_STATE;

  const combined = safeRead(STORAGE_KEYS.appState, null);
  if (combined && typeof combined === 'object') {
    return normalizeState(combined);
  }

  return normalizeState({
    services: safeRead(STORAGE_KEYS.services, SERVICES_SEED),
    orders: safeRead(STORAGE_KEYS.orders, INITIAL_ORDERS),
    reviews: safeRead(STORAGE_KEYS.reviews, INITIAL_REVIEWS),
    payouts: safeRead(STORAGE_KEYS.payouts, INITIAL_PAYOUTS),
    adminAuthed: safeRead(STORAGE_KEYS.admin, false)
  });
}

function writePersistedAppState(state) {
  if (!canUseStorage()) return;

  const normalized = normalizeState(state);

  safeWrite(STORAGE_KEYS.appState, normalized);
  safeWrite(STORAGE_KEYS.services, normalized.services);
  safeWrite(STORAGE_KEYS.orders, normalized.orders);
  safeWrite(STORAGE_KEYS.reviews, normalized.reviews);
  safeWrite(STORAGE_KEYS.payouts, normalized.payouts);
  safeWrite(STORAGE_KEYS.admin, normalized.adminAuthed);
}

function formatPrice(price) {
  return `${Number(price || 0).toLocaleString('ru-RU')} ₽`;
}

function formatDate(value) {
  return new Date(value).toLocaleDateString('ru-RU');
}

function formatDateTime(value) {
  return new Date(value).toLocaleString('ru-RU');
}

function randomId(prefix) {
  return `${prefix}-${Math.random().toString(36).slice(2, 8)}`;
}

function minEnabledPrice(service) {
  const enabled = service.options.filter((item) => item.enabled !== false);
  if (!enabled.length) return service.basePrice;
  return Math.min(...enabled.map((item) => item.price));
}

function statusLabel(status) {
  const labels = {
    DEMO_PAID: 'Оплачено',
    PENDING_FULFILLMENT: 'Ожидает выполнения',
    IN_PROGRESS: 'Выполняется',
    DONE_BY_ADMIN: 'Выполнено администратором',
    CONFIRMED_BY_CLIENT: 'Подтверждено клиентом',
    REVIEW_LEFT: 'Отзыв оставлен'
  };
  return labels[status] || status;
}

function orderTimeline(status) {
  const steps = [
    'DEMO_PAID',
    'PENDING_FULFILLMENT',
    'IN_PROGRESS',
    'DONE_BY_ADMIN',
    'CONFIRMED_BY_CLIENT',
    'REVIEW_LEFT'
  ];
  const index = Math.max(steps.indexOf(status), 0);
  return steps.map((step, i) => ({ key: step, done: i <= index }));
}

function App() {
  const [hydrated, setHydrated] = useState(false);

  const [view, setView] = useState('home');
  const [selectedServiceId, setSelectedServiceId] = useState(null);
  const [selectedOrderId, setSelectedOrderId] = useState(null);
  const [adminAuthed, setAdminAuthed] = useState(false);
  const [adminPasswordInput, setAdminPasswordInput] = useState('');
  const [services, setServices] = useState(SERVICES_SEED);
  const [orders, setOrders] = useState(INITIAL_ORDERS);
  const [reviews, setReviews] = useState(INITIAL_REVIEWS);
  const [payouts, setPayouts] = useState(INITIAL_PAYOUTS);
  const [draftCheckout, setDraftCheckout] = useState(null);
  const [reviewFilter, setReviewFilter] = useState('all');
  const [profileFilter, setProfileFilter] = useState('all');
  const lastSavedSnapshotRef = useRef('');

  useEffect(() => {
    const persistedState = readPersistedAppState();

    setServices(persistedState.services);
    setOrders(persistedState.orders);
    setReviews(persistedState.reviews);
    setPayouts(persistedState.payouts);
    setAdminAuthed(persistedState.adminAuthed);

    writePersistedAppState(persistedState);
    lastSavedSnapshotRef.current = JSON.stringify(persistedState);
    setHydrated(true);
  }, []);

  useEffect(() => {
    if (!hydrated) return;

    const snapshot = {
      services,
      orders,
      reviews,
      payouts,
      adminAuthed
    };

    const nextSerialized = JSON.stringify(snapshot);
    if (nextSerialized === lastSavedSnapshotRef.current) return;

    writePersistedAppState(snapshot);
    lastSavedSnapshotRef.current = nextSerialized;
  }, [services, orders, reviews, payouts, adminAuthed, hydrated]);

  useEffect(() => {
    if (!hydrated || typeof window === 'undefined') return undefined;

    const flushState = () => {
      writePersistedAppState({ services, orders, reviews, payouts, adminAuthed });
    };

    const handleStorageSync = (event) => {
      if (event.key !== STORAGE_KEYS.appState || !event.newValue) return;
      try {
        const nextState = normalizeState(JSON.parse(event.newValue));
        setServices(nextState.services);
        setOrders(nextState.orders);
        setReviews(nextState.reviews);
        setPayouts(nextState.payouts);
        setAdminAuthed(nextState.adminAuthed);
        lastSavedSnapshotRef.current = JSON.stringify(nextState);
      } catch {}
    };

    window.addEventListener('beforeunload', flushState);
    window.addEventListener('pagehide', flushState);
    window.addEventListener('storage', handleStorageSync);

    return () => {
      flushState();
      window.removeEventListener('beforeunload', flushState);
      window.removeEventListener('pagehide', flushState);
      window.removeEventListener('storage', handleStorageSync);
    };
  }, [services, orders, reviews, payouts, adminAuthed, hydrated]);

      })
    );

  function addReview(orderId, rating, text) {
    const order = orders.find((item) => item.id === orderId);
    if (!order) return;
    if (!text || !text.trim()) return;
    if (reviews.some((item) => item.orderId === orderId)) return;

    const newReview = {
      id: randomId('rev'),
      orderId,
      customerName: order.customerName,
      rating,
      text: text.trim(),
      adminReply: '',
      createdAt: new Date().toISOString(),
      serviceTitle: order.serviceTitle,
      optionLabel: order.optionLabel,
      amount: order.amount,
      purchasedAt: order.createdAt
    };

    setReviews((current) => [newReview, ...current]);
    setOrders((current) =>
      current.map((orderItem) => {
        if (orderItem.id !== orderId) return orderItem;
        return { ...orderItem, status: 'REVIEW_LEFT' };
      })
    );
  }

    setServices((current) =>

  function updateOptionPrice(serviceId, optionId, value) {
    setServices((current) =>

        if (service.id !== serviceId) return service;
        return {

          options: service.options.map((option) => {

    setServices((current) =>

          options: service.options.map((option) => {

            return { ...option, enabled: option.enabled === false ? true : false };

        };

    );
  }

    setReviews((current) =>

  function deleteReview(reviewId) {
    const review = reviews.find((item) => item.id === reviewId);
    setReviews((current) => current.filter((item) => item.id !== reviewId));
    if (review) {
      setOrders((current) =>
        current.map((order) => {

  }

            <div style={{ fontSize: 12, textTransform: 'uppercase', letterSpacing: 3, color: '#b99252', fontWeight: 800 }}>
              Таймлайн заказа

              {orderTimeline(order.status).map((item) => (
                <div key={item.key} style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                  <div style={{ width: 10, height: 10, borderRadius: 999, background: item.done ? '#b99252' : 'rgba(0,0,0,0.12)' }} />

              ))}
            </div>
          </div>

          {order.status === 'DONE_BY_ADMIN' ? (
            <div style={{ ...cardStyle(), padding: 24 }}>
              <button onClick={() => confirmCompletion(order.id)} style={{ ...buttonStyle(true), width: '100%', background: '#31463b' }}>

              </button>
            </div>
          ) : null}

          {order.status === 'CONFIRMED_BY_CLIENT' && !review ? (
            <div style={{ ...cardStyle(), padding: 24 }}>
              <div style={{ fontWeight: 900 }}>Оставить отзыв</div>
              <div style={{ marginTop: 14, display: 'grid', gap: 12 }}>
                <select value={rating} onChange={(e) => setRating(Number(e.target.value))} style={inputStyle()}>
                  {[5, 4, 3, 2, 1].map((item) => (
                    <option key={item} value={item}>

                    </option>
                  ))}

                <textarea value={text} onChange={(e) => setText(e.target.value)} rows={4} placeholder="Ваш отзыв" style={inputStyle()} />

              </div>
            </div>
          ) : null}

          {review ? (
            <div style={{ ...cardStyle(), padding: 24 }}>
              <div style={{ fontWeight: 900 }}>Ваш отзыв опубликован</div>
              <div style={{ marginTop: 10, color: 'rgba(46,47,51,0.72)', fontSize: 14, lineHeight: 1.7 }}>
                {review.rating} ★ · {review.text}
              </div>
            </div>
          ) : null}
        </div>
      </div>
    );
  }
